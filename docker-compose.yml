version: '3.8'
# common 모듈은 넣는게 아님, 각 모듈마다 dockerfile에 셋팅해주는거임
services:
  eureka-server:
    build:
      context: .
      dockerfile: ./eureka-server/Dockerfile
    image: eureka-server-service:latest
    container_name: eureka-server
    ports:
      - "19090:19090"  # Eureka 포트
    environment:
      EUREKA_SERVER_PORT: 19090
      SPRING_APPLICATION_NAME: eureka-server-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://eureka-server:19090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: [ "java", "-jar", "eureka-server-0.0.1-SNAPSHOT.jar" ]
    depends_on:
      - zipkin

  gateway:
    build:
      context: .
      dockerfile: ./gateway/Dockerfile
    image: gateway-service:latest
    container_name: gateway
    ports:
      - "19091:19091"  # 호스트:컨테이너 포트
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:19090/eureka/
      JWT_SECRET: this-is-a-very-secure-and-long-secret-key
      ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    restart: always  # 컨테이너가 비정상 종료되면 자동 재시작
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19091/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    command: ["./wait-for-it.sh", "eureka-server:19090", "--", "java", "-jar", "gateway-0.0.1-SNAPSHOT.jar"]
    depends_on:
      - eureka-server

  auth-service:
    build:
      context: .
      dockerfile: ./auth/Dockerfile
    image: auth-service:latest
    container_name: auth-service
    ports:
      - "19093:19093"
    environment:
      AUTH_USER: ${AUTH_USER}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      AUTH_DB: ${AUTH_DB}
      JWT_SECRET: "this-is-a-very-secure-and-long-secret-key"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:19090/eureka/
      ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      - eureka-server
      - gateway
      - auth-db
#     restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19093/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  auth-db:
    image: postgres:latest
    container_name: auth-db
    environment:
      POSTGRES_DB: ${AUTH_DB}
      POSTGRES_USER: ${AUTH_USER}
      POSTGRES_PASSWORD: ${AUTH_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "authdb00",  "-d", "auth"]
      interval: 30s
      timeout: 10s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: ./user/Dockerfile
    image: user-service
    container_name: user-service
    ports:
      - "19092:19092"
    environment:
      USER_USERNAME: ${USER_USERNAME}
      USER_PASSWORD: ${USER_PASSWORD}
      USER_DB: ${USER_DB}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:19090/eureka/
      ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - eureka-server
      - gateway
      - user-db
#    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:19092/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  user-db:
    image: postgres:latest
    container_name: user-db
    environment:
      POSTGRES_DB: ${USER_DB}
      POSTGRES_USER: ${USER_USERNAME}
      POSTGRES_PASSWORD: ${USER_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - user-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "userdb00", "-d", "user"]
      interval: 30s
      timeout: 10s
      retries: 5

